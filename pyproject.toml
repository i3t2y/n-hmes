[tool.ruff]
# Live HF Spaces deployment without a test suite — gate stays on
# correctness/safety, not cosmetic churn that would bury debugging diffs.
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E722", "F", "B", "S602", "S603", "S110"]
ignore = ["F401"]

[tool.black]
line-length = 120
target-version = ["py310"]
