<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="HermesFace social card">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#311B92"/>
      <stop offset="0.55" stop-color="#1A237E"/>
      <stop offset="1" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF59D"/>
      <stop offset="1" stop-color="#FFC107"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#B388FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B388FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" stroke="#ffffff" stroke-opacity="0.06" fill="none" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="950" cy="315" r="320" fill="url(#orb)"/>

  <!-- Hero -->
  <g transform="translate(80 120)" fill="#FFFFFF" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="0" font-size="36" font-weight="600" fill="#FFE082" letter-spacing="4">
      🔱 HERMESFACE
    </text>
    <text x="0" y="100" font-size="84" font-weight="800" letter-spacing="-2">
      Always-on AI,
    </text>
    <text x="0" y="184" font-size="84" font-weight="800" letter-spacing="-2">
      for free, forever.
    </text>

    <text x="0" y="250" font-size="28" font-weight="400" fill="#E1BEE7" letter-spacing="0.3">
      Deploy a self-improving, multi-channel AI assistant
    </text>
    <text x="0" y="288" font-size="28" font-weight="400" fill="#E1BEE7" letter-spacing="0.3">
      on HuggingFace Spaces — 2 vCPU, 16 GB RAM, zero cost.
    </text>

    <g transform="translate(0 340)" font-size="22" font-weight="600">
      <g>
        <rect x="0" y="0" width="220" height="44" rx="22" fill="#7C4DFF"/>
        <text x="110" y="28" text-anchor="middle" fill="#FFFFFF">Hermes Agent</text>
      </g>
      <g>
        <rect x="232" y="0" width="170" height="44" rx="22" fill="#448AFF"/>
        <text x="317" y="28" text-anchor="middle" fill="#FFFFFF">16+ channels</text>
      </g>
      <g>
        <rect x="414" y="0" width="210" height="44" rx="22" fill="#26C6DA"/>
        <text x="519" y="28" text-anchor="middle" fill="#FFFFFF">Self-improving</text>
      </g>
      <g>
        <rect x="636" y="0" width="170" height="44" rx="22" fill="#66BB6A"/>
        <text x="721" y="28" text-anchor="middle" fill="#FFFFFF">Free tier</text>
      </g>
    </g>

    <text x="0" y="430" font-size="20" font-weight="400" fill="#9FA8DA">
      Telegram · Discord · Slack · WhatsApp · Signal · WeChat · iMessage · +9 more
    </text>
  </g>

  <!-- Trident emblem -->
  <g transform="translate(870 140)" opacity="0.95">
    <circle cx="160" cy="160" r="170" fill="#1A237E" stroke="#B388FF" stroke-width="2" opacity="0.85"/>
    <g transform="translate(70 40)" stroke="url(#gold)" stroke-width="12" fill="none"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M90 0 L90 55 M45 30 L45 90 M135 30 L135 90
               M15 60 Q90 115 165 60
               M90 55 L90 260
               M90 260 Q50 270 45 295
               M90 260 Q130 270 135 295"/>
    </g>
    <path d="M131 40 L135 15 L139 40 Z M86 15 L90 -5 L94 15 Z M41 40 L45 15 L49 40 Z"
          transform="translate(70 40)" fill="url(#gold)"/>
  </g>
</svg>
